<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verovio + BroadcastChannel spike — HKL Composer Phase 0</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body { background: #111; color: #ccc; font-family: system-ui, sans-serif; padding: 16px; min-height: 100vh }
  h1 { color: #fff; font-size: 16px; margin-bottom: 8px }
  h2 { color: #aaa; font-size: 13px; margin: 16px 0 6px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase }
  .status { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 12px; font-family: 'SF Mono', ui-monospace, monospace; font-size: 12px; color: #888; margin-bottom: 16px }
  .status.ready { color: #4CFFBA; border-color: #2a4a3a }
  .status.error { color: #FF4C79; border-color: #4a2a3a }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px }
  button { background: #222; color: #ccc; border: 1.5px solid #555; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: inherit; font-size: 12px }
  button:hover { border-color: #888 }
  button:disabled { opacity: 0.4; cursor: not-allowed }
  button.primary { border-color: #4CFFBA; color: #4CFFBA }
  .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 16px }
  .pane { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; min-height: 400px }
  .pane#scorePane { overflow: auto }
  .pane#scorePane svg { background: #fff; border-radius: 4px }
  .log { font-family: 'SF Mono', ui-monospace, monospace; font-size: 11px; color: #888; white-space: pre-wrap; line-height: 1.5; max-height: 600px; overflow-y: auto }
  .log .ok { color: #4CFFBA }
  .log .err { color: #FF4C79 }
  .log .info { color: #4C96FF }
  .log .meta { color: #666 }
  g.note.playing g.notehead { fill: #FF4C79 !important }
</style>
</head>
<body>

<h1>HKL Composer Phase 0 spike — Verovio + BroadcastChannel verification</h1>
<div class="status" id="status">Loading Verovio WASM…</div>

<h2>V1–V4 Verovio tests</h2>
<div class="controls">
  <button id="btnV1" class="primary" disabled>V1: render colored chord</button>
  <button id="btnV2" disabled>V2: enable click-to-locate</button>
  <button id="btnV3" disabled>V3: mutate MEI (add chord)</button>
  <button id="btnV4" disabled>V4: simulate playback</button>
  <button id="btnReset" disabled>Reset MEI</button>
</div>

<h2>V5 BroadcastChannel test (open this page in two tabs)</h2>
<div class="controls">
  <button id="btnPing">Send ping → other tab</button>
  <button id="btnConnect">Subscribe as &ldquo;Composer&rdquo; (sim)</button>
  <button id="btnSendHeld">Broadcast simulated held-keys (as HKL)</button>
</div>

<div class="panes">
  <div class="pane" id="scorePane"><em>(score renders here)</em></div>
  <div class="pane log" id="log"></div>
</div>

<script src="https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js"></script>
<script>
'use strict';

/* ─── logging ─── */
const logEl = document.getElementById('log');
function log(msg, cls) {
  const ts = new Date().toISOString().slice(11, 23);
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = '[' + ts + '] ' + msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}
function setStatus(text, kind) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (kind ? ' ' + kind : '');
}

/* ─── MEI fixtures ─── */
const INITIAL_MEI = `<?xml version="1.0" encoding="UTF-8"?>
<mei xmlns="http://www.music-encoding.org/ns/mei">
  <meiHead><fileDesc><titleStmt><title>HKL spike</title></titleStmt><pubStmt/></fileDesc></meiHead>
  <music><body><mdiv><score>
    <scoreDef>
      <staffGrp>
        <staffDef n="1" lines="5" clef.shape="G" clef.line="2"/>
      </staffGrp>
    </scoreDef>
    <section>
      <measure n="1">
        <staff n="1"><layer n="1">
          <chord xml:id="c1" dur="4">
            <note xml:id="n1" pname="c" oct="4" color="#e64c00"/>
            <note xml:id="n2" pname="e" oct="4" color="#bc8118"/>
            <note xml:id="n3" pname="g" oct="4" color="#0967cf"/>
          </chord>
          <chord xml:id="c2" dur="2">
            <note xml:id="n4" pname="d" oct="4" color="#8413cc"/>
            <note xml:id="n5" pname="f" oct="4" color="#05c8c0"/>
          </chord>
          <note xml:id="n6" pname="a" oct="4" dur="4" color="#f40e97"/>
          <note xml:id="n7" pname="b" oct="4" dur="4" color="#51b812"/>
        </layer></staff>
      </measure>
    </section>
  </score></mdiv></body></music>
</mei>`;

const ADDITIONAL_CHORD_MEI = `<chord xml:id="cX" dur="2">
  <note xml:id="nX1" pname="c" oct="5" color="#f40e97"/>
  <note xml:id="nX2" pname="e" oct="5" color="#0967cf"/>
  <note xml:id="nX3" pname="g" oct="5" color="#bc8118"/>
</chord>`;

let currentMei = INITIAL_MEI;
let tk = null;
let nextChordIdCounter = 0;

/* ─── Verovio bootstrap ─── */
verovio.module.onRuntimeInitialized = function () {
  tk = new verovio.toolkit();
  log('Verovio loaded. version: ' + tk.getVersion(), 'ok');
  setStatus('Verovio ready (v' + tk.getVersion() + '). Click V1 to render.', 'ready');
  document.getElementById('btnV1').disabled = false;
  document.getElementById('btnReset').disabled = false;

  tk.setOptions({
    pageHeight: 800,
    pageWidth: 1200,
    scale: 50,
    svgAdditionalAttribute: ['note@pname', 'note@oct', 'note@color'],
    breaks: 'none', /* scroll-view test */
  });
};

/* ─── V1: render colored chord ─── */
function renderCurrent() {
  if (!tk) return;
  tk.loadData(currentMei);
  const svg = tk.renderToSVG(1, {});
  document.getElementById('scorePane').innerHTML = svg;
}

document.getElementById('btnV1').addEventListener('click', () => {
  try {
    renderCurrent();
    log('V1: rendered initial MEI', 'ok');
    log('  Look at the score pane: 2 chords + 2 notes, each notehead a different lattice-derived color.', 'meta');
    ['btnV2', 'btnV3', 'btnV4'].forEach(id => document.getElementById(id).disabled = false);
  } catch (e) {
    log('V1 FAILED: ' + e.message, 'err');
  }
});

/* ─── V2: click-to-locate ─── */
let v2Wired = false;
document.getElementById('btnV2').addEventListener('click', () => {
  if (v2Wired) {
    log('V2 already enabled — click any notehead in the score.', 'meta');
    return;
  }
  const pane = document.getElementById('scorePane');
  pane.addEventListener('click', (e) => {
    const noteG = e.target.closest('g.note');
    if (!noteG) { log('  (click hit no note)', 'meta'); return; }
    const id = noteG.id;
    try {
      const attrJson = tk.getElementAttr(id);
      log('V2 click → id: ' + id + ' attrs: ' + attrJson, 'ok');
    } catch (err) {
      log('V2 click → id: ' + id + ' (getElementAttr threw: ' + err.message + ')', 'err');
    }
  });
  v2Wired = true;
  log('V2: click handler attached. Click any notehead to test.', 'ok');
});

/* ─── V3: mutate MEI ─── */
document.getElementById('btnV3').addEventListener('click', () => {
  try {
    nextChordIdCounter++;
    /* Use DOMParser/Serializer for proper XML manipulation. */
    const parser = new DOMParser();
    const doc = parser.parseFromString(currentMei, 'application/xml');
    const layer = doc.querySelector('layer');
    if (!layer) throw new Error('no <layer> found');
    const fragDoc = parser.parseFromString(
      ADDITIONAL_CHORD_MEI
        .replace(/cX/g, 'c' + (10 + nextChordIdCounter))
        .replace(/nX1/g, 'nx' + (100 + nextChordIdCounter) + '_1')
        .replace(/nX2/g, 'nx' + (100 + nextChordIdCounter) + '_2')
        .replace(/nX3/g, 'nx' + (100 + nextChordIdCounter) + '_3'),
      'application/xml');
    const newChord = fragDoc.documentElement;
    /* Re-create the element in the parent doc to inherit namespace correctly. */
    function importWithNs(srcEl, targetDoc, ns) {
      const newEl = targetDoc.createElementNS(ns, srcEl.localName);
      for (const attr of srcEl.attributes) {
        newEl.setAttribute(attr.name, attr.value);
      }
      for (const child of srcEl.children) {
        newEl.appendChild(importWithNs(child, targetDoc, ns));
      }
      return newEl;
    }
    const ns = doc.documentElement.namespaceURI;
    layer.appendChild(importWithNs(newChord, doc, ns));
    currentMei = new XMLSerializer().serializeToString(doc);
    renderCurrent();
    log('V3: appended new chord, re-rendered. Bar now has more elements.', 'ok');
  } catch (e) {
    log('V3 FAILED: ' + e.message, 'err');
  }
});

/* ─── V4: simulate playback (cursor follow only — no audio) ─── */
let v4Timer = null;
document.getElementById('btnV4').addEventListener('click', () => {
  if (v4Timer) {
    clearInterval(v4Timer);
    v4Timer = null;
    document.querySelectorAll('g.note.playing').forEach(g => g.classList.remove('playing'));
    log('V4: stopped.', 'meta');
    return;
  }
  let lastIds = [];
  let t = 0;
  const STEP_MS = 50;
  let durationMs;
  try {
    /* renderToMIDI() returns base64; we just need the implied length. The
       cleaner approach: compute duration as the last element's end time. */
    const midiB64 = tk.renderToMIDI();
    log('V4: renderToMIDI() returned ' + midiB64.length + ' base64 chars', 'info');
    /* Find the total duration via getElementsAtTime polling — increase t until
       no notes return for a couple steps in a row. */
    durationMs = 6000; /* generous upper bound; real version would parse MIDI header */
  } catch (e) {
    log('V4: renderToMIDI threw: ' + e.message, 'err');
    return;
  }
  log('V4: starting cursor follow (50ms step, ' + durationMs + 'ms total)', 'ok');
  v4Timer = setInterval(() => {
    try {
      const result = tk.getElementsAtTime(t);
      const ids = (result && result.notes) || [];
      /* Toggle 'playing' class to highlight currently-sounding notes. */
      if (JSON.stringify(ids) !== JSON.stringify(lastIds)) {
        document.querySelectorAll('g.note.playing').forEach(g => g.classList.remove('playing'));
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.classList.add('playing');
        });
        log('  t=' + t + 'ms notes: [' + ids.join(', ') + ']', 'meta');
        lastIds = ids;
      }
    } catch (e) {
      log('V4 getElementsAtTime threw: ' + e.message, 'err');
    }
    t += STEP_MS;
    if (t > durationMs) {
      clearInterval(v4Timer);
      v4Timer = null;
      document.querySelectorAll('g.note.playing').forEach(g => g.classList.remove('playing'));
      log('V4: playback simulation complete.', 'ok');
    }
  }, STEP_MS);
});

document.getElementById('btnReset').addEventListener('click', () => {
  currentMei = INITIAL_MEI;
  nextChordIdCounter = 0;
  if (tk) renderCurrent();
  log('Reset: MEI restored to initial fixture.', 'info');
});

/* ─── V5: BroadcastChannel ping/pong + held-keys simulation ─── */
const CH = new BroadcastChannel('hkl-composer-bridge');
let actingAs = 'unset';
CH.addEventListener('message', (e) => {
  const m = e.data;
  if (!m || !m.type) return;
  if (m.type === 'ping') {
    log('V5 RX ping from ' + (m.from || '?') + ' (rtt-mark ' + m.t + ')', 'info');
    CH.postMessage({ type: 'pong', t: m.t, replyT: performance.now(), from: actingAs });
  } else if (m.type === 'pong') {
    const rtt = performance.now() - m.t;
    log('V5 RX pong ← rtt=' + rtt.toFixed(2) + 'ms (replier=' + m.from + ')', 'ok');
  } else if (m.type === 'held-keys') {
    log('V5 RX held-keys (' + m.keys.length + ' notes): ' +
      m.keys.map(k => k.pname.toUpperCase() + (k.accid || '') + k.oct + '(' + k.colorHex + ')').join(' '), 'info');
  } else {
    log('V5 RX unknown type: ' + JSON.stringify(m), 'meta');
  }
});

document.getElementById('btnPing').addEventListener('click', () => {
  const t = performance.now();
  CH.postMessage({ type: 'ping', t, from: actingAs });
  log('V5 TX ping (open another tab to receive it)', 'info');
});

document.getElementById('btnConnect').addEventListener('click', () => {
  actingAs = (actingAs === 'composer') ? 'unset' : 'composer';
  log('V5 acting as: ' + actingAs, 'info');
});

document.getElementById('btnSendHeld').addEventListener('click', () => {
  /* Simulated payload — mimics what HKL would broadcast. Fully-resolved per
     the Composer-doesn't-need-tuning architecture. */
  const sample = [
    { q: 0,  r: 0,  pname: 'a', accid: '', oct: 3, midi: 57, colorHex: '#bc8118', velocity: 96 },
    { q: -2, r: 2,  pname: 'd', accid: 's', oct: 4, midi: 62, colorHex: '#0967cf', velocity: 96 },
    { q: 1,  r: -1, pname: 'f', accid: '', oct: 4, midi: 65, colorHex: '#f40e97', velocity: 96 },
  ];
  CH.postMessage({ type: 'held-keys', keys: sample, from: actingAs });
  log('V5 TX held-keys broadcast: ' + sample.length + ' notes', 'info');
});

log('Page loaded. Open in two tabs of the same origin to test V5 cross-tab.', 'info');
</script>

</body>
</html>
