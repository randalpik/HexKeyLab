<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="HKL Composer — a keyboard-driven music notation editor using Verovio. Companion to HexKeyLab.">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>HKL Composer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0 }
html, body { background: #111; height: 100%; overflow: hidden }
body { font-family: system-ui, -apple-system, sans-serif; color: #ccc; display: flex; flex-direction: column }

#composerToolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
  font-size: 12px; flex: 0 0 auto;
}
#composerToolbar .group { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border: 1px solid #2a2a2a; border-radius: 4px; min-height: 28px }
#composerToolbar .label { color: #888; font-size: 11px; letter-spacing: 0.3px }
#composerToolbar .value { color: #fff; font-weight: 500; min-width: 14px; text-align: center }
#composerToolbar .conn { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #2a1a1a; color: #FF4C79; border: 1px solid #4a2a3a }
#composerToolbar .conn.connected { background: #1a2a1a; color: #4CFFBA; border-color: #2a4a3a }
#composerToolbar .conn.standalone { background: #2a2a1a; color: #FFF94C; border-color: #4a4a2a }
#composerToolbar .btn { padding: 3px 12px; background: #222; color: #ccc; border: 1.5px solid #555; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px }
#composerToolbar .btn:hover { border-color: #888 }
#composerToolbar .btn.active { border-color: #4CFFBA; color: #4CFFBA }
#composerToolbar .spacer { flex: 1 }

#composerMain {
  flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
  background: #1a1a1a; overflow: hidden;
}
#score {
  flex: 1 1 auto; min-height: 0;
  background: #fafafa;
  overflow: auto;
  position: relative;
}
/* Verovio output renders at its real intrinsic pixel size (explicit
   width/height when svgViewBox is off). Anchored top-left of #score — no
   margin, no centering. Flows normally so it contributes to #score's
   scrollable area; overflow: auto on #score handles scrolling when the
   SVG exceeds visible dimensions. */
#score > svg { display: block; margin: 0 }
/* Cursor overlay is sized to match Verovio's SVG dimensions in JS so it
   covers the same scrollable area. Both children of #score scroll together. */
#score > svg#cursorOverlay {
  position: absolute; left: 0; top: 0;
  pointer-events: none;
}


/* All strokes — staff lines, ledger lines, bar lines, stems — render
   with geometricPrecision so they anti-alias consistently across browser
   zoom levels. crispEdges snaps sub-pixel positions to integer pixels,
   which causes (a) inconsistent stroke widths for elements at parity-
   sensitive coordinates (stems, bar lines) and (b) lines disappearing
   entirely when sub-pixel anti-aliasing would have rendered them faintly
   visible at high zoom-out. Anti-aliasing keeps everything visually
   coherent and is the right foundation for in-app zoom control. */
#score svg .staff path,
#score svg .ledgerLines path,
#score svg .ledgerLines line,
#score svg .barLineAttr path,
#score svg .barLine path,
#score svg .barLine line,
#score svg .barLine rect,
#score svg .stem path,
#score svg .stem line,
#score svg .stem rect { shape-rendering: geometricPrecision }

/* The MEI @color attribute on <note> propagates to all descendants by default
   — notehead AND stem AND flag AND accidental AND dots. We want color on
   the literal circular notehead only. Force stems, flags, accidentals,
   ledger lines, and rhythm dots back to black. */
#score svg .stem,
#score svg .stem *,
#score svg .flag,
#score svg .flag *,
#score svg .accid,
#score svg .accid *,
#score svg .ledgerLines,
#score svg .ledgerLines *,
#score svg .dots,
#score svg .dots * { color: #000 !important; fill: #000 !important }

/* Tuplet placeholder: the <rest data-tuplet-placeholder="true"> elements
 * we put inside <tuplet> to make Verovio draw the bracket. We want the
 * bracket but NOT the rest glyphs. Verovio's @visible attribute on rests
 * isn't honored (issue rism-digital/verovio#202); MEI's <space> isn't
 * treated as bracket-triggering content. So we use real <rest>s and hide
 * their glyphs in CSS. The selector has `data-data-` because Verovio
 * prepends `data-` to attribute names exposed via svgAdditionalAttribute,
 * so MEI's `data-tuplet-placeholder` becomes `data-data-tuplet-placeholder`
 * in the SVG. `visibility: hidden` preserves layout width (so the bracket
 * spans the right horizontal range); display:none would collapse it. */
#score svg g.rest[data-data-tuplet-placeholder="true"] { visibility: hidden }

/* Toolbar Play button playing-state styling. */
#composerToolbar .btn.playing { border-color: #FF4C79; color: #FF4C79 }

/* Expression layer: selected dynam/hairpin in the rendered SVG. Applied by
   cursor.ts whenever the expression cursor lands on a moment with an
   existing dynamic or inside an existing hairpin's range. */
#score svg .expr-selected,
#score svg .expr-selected * {
  fill: #e47226 !important;
  stroke: #e47226;
}
#score svg g.hairpin.expr-selected path,
#score svg g.hairpin.expr-selected line {
  stroke-width: 1.5;
}

/* Document Setup modal. */
.hkl-dialog {
  background: #1a1a1a; color: #ccc;
  border: 1px solid #333; border-radius: 6px;
  padding: 18px 24px; min-width: 420px;
  font-family: system-ui, -apple-system, sans-serif;
}
.hkl-dialog::backdrop { background: rgba(0, 0, 0, 0.55) }
.hkl-dialog h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #fff }
.hkl-dialog .row {
  display: grid; grid-template-columns: 130px 1fr; gap: 10px;
  align-items: center; margin: 8px 0; font-size: 12px;
}
.hkl-dialog .row > span:first-child { color: #888 }
.hkl-dialog input[type=text],
.hkl-dialog input[type=number],
.hkl-dialog select {
  background: #222; color: #ccc;
  border: 1.5px solid #555; border-radius: 4px;
  padding: 3px 8px; font: inherit;
}
.hkl-dialog input:focus, .hkl-dialog select:focus { outline: none; border-color: #4CFFBA }
.hkl-dialog fieldset {
  border: 1px solid #2a2a2a; border-radius: 4px;
  padding: 6px 10px; display: flex; gap: 6px; align-items: center;
}
.hkl-dialog fieldset legend { color: #888; font-size: 11px; padding: 0 4px }
.hkl-dialog fieldset input[type=text] { min-width: 0; flex: 1 }
.hkl-dialog fieldset input[type=number] { width: 60px }
.hkl-dialog fieldset.dyn-row { flex-wrap: wrap; gap: 8px }
.hkl-dialog fieldset.dyn-row label { display: inline-flex; align-items: center; gap: 4px; color: #ccc; font-size: 11px }
.hkl-dialog fieldset.dyn-row input[type=number] { width: 50px }
.hkl-dialog .time-row { display: flex; gap: 6px; align-items: center }
.hkl-dialog .actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
}
.hkl-dialog .actions button {
  padding: 4px 14px; background: #222; color: #ccc;
  border: 1.5px solid #555; border-radius: 4px;
  cursor: pointer; font: inherit;
}
.hkl-dialog .actions button:hover { border-color: #888 }
.hkl-dialog .actions button#setupOk { border-color: #4CFFBA; color: #4CFFBA }

#composerStatus {
  padding: 4px 12px; background: #1a1a1a; border-top: 1px solid #2a2a2a;
  font-family: 'SF Mono', ui-monospace, monospace; font-size: 11px; color: #888;
  flex: 0 0 auto;
}
</style>
</head>
<body>

<div id="composerToolbar">
  <div class="group">
    <span class="label">Voice</span>
    <span class="value" id="voiceIndicator">1</span>
  </div>
  <div class="group">
    <span class="label">Duration</span>
    <span class="value" id="durationIndicator">4</span>
  </div>
  <div class="group">
    <span class="label">Mode</span>
    <span class="value" id="modeIndicator">INS</span>
  </div>
  <div class="group">
    <button class="btn active" id="btnViewPage">Page</button>
    <button class="btn" id="btnViewScroll">Scroll</button>
  </div>
  <div class="group">
    <button class="btn" id="btnPlay" title="Play score from beginning">▶ Play</button>
  </div>
  <div class="group">
    <button class="btn" id="btnSetup" title="Document setup (title, composer, key, meter, tempo)">Setup…</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="btnSave">Save .hkc</button>
  <button class="btn" id="btnLoad">Load .hkc</button>
  <button class="btn" id="btnExportXml">Export .musicxml</button>
  <div class="conn" id="connStatus">no HKL</div>
</div>

<div id="composerMain">
  <div id="score"></div>
</div>

<div id="composerStatus" id="composerStatus">Loading Verovio…</div>

<input type="file" id="fileInputHkc" accept=".hkc,.xml,.mei" style="display:none">

<dialog id="setupDialog" class="hkl-dialog">
  <form id="setupForm" method="dialog">
    <h2>Document Setup</h2>
    <label class="row"><span>Title</span><input id="setupTitle" type="text" autocomplete="off"></label>
    <label class="row"><span>Composer</span><input id="setupComposer" type="text" autocomplete="off"></label>
    <label class="row"><span>Key signature</span><select id="setupKey"></select></label>
    <div class="row">
      <span>Time signature</span>
      <div class="time-row">
        <select id="setupTimeNum"></select>
        <span>/</span>
        <select id="setupTimeDen"></select>
      </div>
    </div>
    <div class="row">
      <span>Tempo</span>
      <fieldset>
        <input id="setupTempoText" type="text" placeholder="(optional, e.g. Allegro)">
        <select id="setupTempoUnit"></select>
        <span>=</span>
        <input id="setupTempoBpm" type="number" min="20" max="300" step="1">
      </fieldset>
    </div>
    <div class="row">
      <span>Dynamics → velocity</span>
      <fieldset class="dyn-row">
        <label>fff <input id="setupDyn_fff" type="number" min="1" max="127" step="1"></label>
        <label>ff  <input id="setupDyn_ff"  type="number" min="1" max="127" step="1"></label>
        <label>f   <input id="setupDyn_f"   type="number" min="1" max="127" step="1"></label>
        <label>mf  <input id="setupDyn_mf"  type="number" min="1" max="127" step="1"></label>
        <label>mp  <input id="setupDyn_mp"  type="number" min="1" max="127" step="1"></label>
        <label>p   <input id="setupDyn_p"   type="number" min="1" max="127" step="1"></label>
        <label>pp  <input id="setupDyn_pp"  type="number" min="1" max="127" step="1"></label>
        <label>ppp <input id="setupDyn_ppp" type="number" min="1" max="127" step="1"></label>
      </fieldset>
    </div>
    <div class="actions">
      <button type="submit" value="cancel">Cancel</button>
      <button type="submit" value="ok" id="setupOk">Save</button>
    </div>
  </form>
</dialog>

<script type="module" src="/src/composer/main.ts"></script>
</body>
</html>
